<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>assigment3</title>


</head>

<body>
    <span>
        <form action="">
            <h1 style="text-align: center;"> Pete's Pizza Delivery</h1>
            <h2 style="text-align: center;"> Online Order Form</h2>
            <p style="text-align: center;">* required fields</p>
            <fieldset>

                <legend>Customer details</legend>
                <label for="name">*Name: </label>
                <input type="text" name="" id="name">
                <br>
                <br>
                <label for="address">*Address: </label>
                <input type="text" name="" id="address">
                <br>
                <br>
                <label for="city">*Town/city: </label>
                <input type="text" name="" id="city">
                <br>
                <br>
                <label for="postcode">*Postcode: </label>
                <input type="number" name="" id="postcode">
                <br>
                <br>
                <label for="telphone">*Tel: </label>
                <input type="number" name="" id="telephone">
                <br>
                <br>
                <label for="email">*Email: </label>
                <input type="email" name="" id="email">
                <br>
                <br>
            </fieldset>
            <br>






            <fieldset>
                <legend>Topping*</legend>
                <input type="radio" name="topping" id="margherita">
                <label for="margherita">Margherita</label>
                <br>
                <input type="radio" name="topping" id="fourseason">
                <label for="fourseason">Four Season</label>
                <br>
                <input type="radio" name="topping" id="meatfeast">
                <label for="meatfeast">Meat Feast</label>
            </fieldset>






            <fieldset>
                <legend>Size*</legend>
                <input type="radio" name="size" id="small">
                <label for="small">Small</label>
                <br>
                <input type="radio" name="size" id="medium">
                <label for="medium">Medium</label>
                <br>
                <input type="radio" name="size" id="large">
                <label for="large">Large</label>
            </fieldset>

            <fieldset>
                <legend>Extras*</legend>
                <input type="checkbox" id="mashrooms">
                <label for="mashrooms">Mashrooms</label>
                <br>
                <input type="checkbox" id="greenpeppers">
                <label for="greenpappers">Green peppers</label>
                <br>
                <input type="checkbox" id="anchovies">
                <label for="anchovies">Anchovies</label>
                <br>
                <input type="checkbox" id="extracheese">
                <label for="extracheese">Extra cheese</label>
            </fieldset>

            <fieldset>
                <legend>Delivery</legend>
                <label for="time">Prefered delivery time: </label>
                <input type="time">
                <br>
                <br>
                <label for="Deliveryinstructions">Delivery instructions: </label>
                <br>
                <br>
                <textarea name="" id="Deliveryinstructions" rows="4" cols="90"></textarea>






            </fieldset>
            <br>
            <center>

            <button type="submit" id="button" >Submit order</button>
            </center>










        </form>





    </span>

</body>

</html>
