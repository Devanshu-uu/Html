<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>

<body>
    <div>
        <form action="welcomePage.html" target="_blank">
            <label for="fullName">Full Name: </label>
            <input type="text" id="fullName" placeholder="Enter your name" required>
            <br>
            <br>
            <label for="email">Email: </label>
            <input type="email" id="email" placeholder="Enter your email" required>
            <br>
            <br>
            <label for="password">Password: </label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <br>
            <br>
            <label for="checkbox">Are you 18?</label>
            <input type="checkbox" id="checkbox" required>
            <br>
            <br>
            <label for="mobileNumber">Phone Number: </label>
            <input type="number" id="mobileNumber" required min="0">
            <br>
            <br>
            <label for="male">Gender: </label>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" required>
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" required>

            <br>
            <br>
            <label for="date">Enter your DOB: </label>
            <input type="date" id="date" required>

            <br>
            <br>
            <label for="img">Upload Photo: </label>
            <input type="file" name="" id="img" required>

            <br>
            <br>
            <label for="city">Select you city: </label>
            <select name="" id="city" required>
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="kolkata">Kolkata</option>
                <option value="rajistan">Rajisthan</option>
                <option value="up">Up</option>
            </select>


            <br>
            <br>
            <!-- <input type="submit" name="" id=""> -->
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
